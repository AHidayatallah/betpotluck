<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amanda Smith</title>
  <style>
    /* ===== EDIT COLORS & FONTS HERE ===== */
    :root {
      --bg: #0f172a;          /* page background */
      --card: #1e293b;        /* card background */
      --accent: #38bdf8;      /* highlight color */
      --text: #e2e8f0;        /* main text */
      --muted: #94a3b8;       /* softer text */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--card);
      max-width: 640px;
      width: 100%;
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 4px;
    }

    .tagline {
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 24px;
    }

    .bio {
      color: var(--muted);
      margin-bottom: 32px;
    }

    .section-title {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .links a {
      text-decoration: none;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      padding: 10px 18px;
      border-radius: 999px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .links a:hover {
      background: var(--accent);
      color: #0f172a;
      transform: translateY(-2px);
    }

    footer {
      margin-top: 36px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <!-- The avatar shows your initials. Change "AS" below. -->
    <div class="avatar">AS</div>

    <!-- ===== EDIT YOUR DETAILS HERE ===== -->
    <h1>Amanda Smith</h1>
    <p class="tagline">Hello, world 👋</p>

    <p class="bio">
      This is my personal page. I'm just getting started — soon this will tell you
      a bit about who I am, what I'm interested in, and what I'm working on.
    </p>

    <p class="section-title">Find me</p>
    <div class="links">
      <a href="mailto:amanda.smith@alyenergy.com">Email</a>
      <a href="#">LinkedIn</a>
      <a href="#">GitHub</a>
      <a href="#">Twitter / X</a>
    </div>

    <footer>
      Built with curiosity · 2026
    </footer>
  </main>
</body>
</html>
